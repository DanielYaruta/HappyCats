<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HappyCats</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button
      id="themeToggle"
      class="theme-toggle"
      type="button"
      aria-label="Переключить тему оформления"
      aria-pressed="false"
    >
      <span class="theme-toggle__print" aria-hidden="true"></span>
      <svg
        class="theme-toggle__paw"
        viewBox="0 0 64 64"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <ellipse class="paw-pad" cx="32" cy="40" rx="16" ry="13" />
        <ellipse
          class="paw-toe"
          cx="14"
          cy="20"
          rx="6.5"
          ry="8"
          transform="rotate(-18 14 20)"
        />
        <ellipse
          class="paw-toe"
          cx="27"
          cy="11"
          rx="6.5"
          ry="8.5"
          transform="rotate(-6 27 11)"
        />
        <ellipse
          class="paw-toe"
          cx="41"
          cy="11"
          rx="6.5"
          ry="8.5"
          transform="rotate(6 41 11)"
        />
        <ellipse
          class="paw-toe"
          cx="53"
          cy="20"
          rx="6.5"
          ry="8"
          transform="rotate(18 53 20)"
        />
      </svg>
    </button>

    <main class="page">
      <section class="hero">
        <div class="hero__inner">
          <button class="hero__scroll" id="scrollDown" type="button">
            <span class="hero__scroll-text">Смотри, кто ждёт внизу</span>
            <svg
              class="hero__scroll-arrow"
              viewBox="0 0 64 64"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <ellipse class="hero__scroll-pad" cx="32" cy="40" rx="16" ry="13" />
              <ellipse
                class="hero__scroll-toe"
                cx="14"
                cy="20"
                rx="6.5"
                ry="8"
                transform="rotate(-18 14 20)"
              />
              <ellipse
                class="hero__scroll-toe"
                cx="27"
                cy="11"
                rx="6.5"
                ry="8.5"
                transform="rotate(-6 27 11)"
              />
              <ellipse
                class="hero__scroll-toe"
                cx="41"
                cy="11"
                rx="6.5"
                ry="8.5"
                transform="rotate(6 41 11)"
              />
              <ellipse
                class="hero__scroll-toe"
                cx="53"
                cy="20"
                rx="6.5"
                ry="8"
                transform="rotate(18 53 20)"
              />
            </svg>
          </button>
        </div>
      </section>

      <section class="form-section" id="formSection">
        <div class="card" aria-labelledby="formTitle">
          <header class="card__intro">
            <div class="card__brand">
              <svg
                class="card__brand-paw"
                viewBox="0 0 64 64"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <ellipse class="card__brand-pad" cx="32" cy="40" rx="16" ry="13" />
                <ellipse
                  class="card__brand-toe"
                  cx="14"
                  cy="20"
                  rx="6.5"
                  ry="8"
                  transform="rotate(-18 14 20)"
                />
                <ellipse
                  class="card__brand-toe"
                  cx="27"
                  cy="11"
                  rx="6.5"
                  ry="8.5"
                  transform="rotate(-6 27 11)"
                />
                <ellipse
                  class="card__brand-toe"
                  cx="41"
                  cy="11"
                  rx="6.5"
                  ry="8.5"
                  transform="rotate(6 41 11)"
                />
                <ellipse
                  class="card__brand-toe"
                  cx="53"
                  cy="20"
                  rx="6.5"
                  ry="8"
                  transform="rotate(18 53 20)"
                />
              </svg>
              <span class="card__brand-name">HappyCats</span>
            </div>
            <h1 id="formTitle" class="card__title">
              Котята ищут новый дом!
            </h1>
            <p class="card__subtitle">
              Оставьте имя и почту — напишем, как только в приюте появятся котята,
              и расскажем, что делать дальше.
            </p>
          </header>

          <form id="signupForm" class="form" novalidate>
            <div class="field">
              <label class="field__label" for="fullname">Ваше имя</label>
              <input
                class="field__input"
                type="text"
                id="fullname"
                name="fullname"
                placeholder="Имя"
                autocomplete="name"
              />
              <span class="field__error" id="fullname-error" role="alert"></span>
            </div>

            <div class="field">
              <label class="field__label" for="email">Электронная почта</label>
              <input
                class="field__input"
                type="text"
                id="email"
                name="email"
                placeholder="example@mail.com"
                autocomplete="email"
              />
              <span class="field__error" id="email-error" role="alert"></span>
            </div>

            <button class="form__submit" type="submit">
              <span>Сообщить о котятах</span>
            </button>
          </form>

          <div class="success" id="successMessage" hidden>
            <div class="success__paw" aria-hidden="true">🐾</div>
            <p class="success__title">Спасибо!</p>
            <p class="success__text">
              Мы напишем вам на почту, как только в приюте появятся котята,
              которые ищут дом.
            </p>
          </div>

          <audio id="purrSound" src="audio/purr.mp3" preload="auto"></audio>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
